<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
            name="viewport"
            content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    >
    <meta
            http-equiv="X-UA-Compatible"
            content="ie=edge"
    >
    <link rel="stylesheet" href="style5.3.css">
    <title>Burgers</title>
</head>
<body>
    <div class="container">
        <nav>
            <ul>
                <li><a href="#">About</a></li>
                <li><a href="#">Menu</a></li>
                <li><a class="nav__active-link" href="#">Order Online</a></li>
            </ul>
        </nav>
        <h1 class="header-title">NEW YORK’S FAVORITE ORGANIC HAMBURGER JOINT</h1>
        <img class="burger-img" src="img/Burgers.png" alt="Burgers">

        <section class="burger">
            <div class="burger__container">
                <h2 class="burger-title">the burger above all burgerss</h2>
            </div>
            <div class="burger__wrapper">
                <p class="burger-desc">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Aenean nec ornare neque.</p>
                <button class="burger-button">About Us</button>
            </div>
        </section>

        <section class="burgers">
            <div class="burger__container">
                <img src="img/Rectangle%2017.png" alt="Burgers">
            </div>
            <div class="burger__wrapper">
                <img src="img/Rectangle%2016.png" alt="French fries">
            </div>
        </section>

        <section class="cafe">
            <img src="img/Rectangle 21.png" alt="Cafe">
        </section>

        <section class="order">
            <h3 class="order-title">order online or come visit us today</h3>
            <button class="order-button">Get Started</button>
        </section>
    </div>
</body>
</html>
