<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
  >
  <meta
    http-equiv="X-UA-Compatible"
    content="ie=edge"
  >
  <title>Login</title>
</head>
<link
  rel="stylesheet"
  href="style6.3.css"
>
<body>
<main>
    <div class="form-container">
        <h2>Instagram</h2>
        <form>
            <input type="email" id="email"
                   placeholder="Номер телефону, ім'я користувача або email">

            <input type="password" id="password"
                   placeholder="Пароль">
            <button type="submit">Увійти</button>
        </form>
        <div class="or-container">
            <span>АБО</span>
        </div>
        <div class="login-facebook-container">
          <img
            src="img/icons8-facebook.svg"
            alt="facebook-icon"
          >
            <a href="#">Увійти через Facebook</a>
        </div>
        <div class="forget-password-container">
            <a href="#">Забули пароль?</a>
        </div>
    </div>

    <div class="signup-container">
        <p>Не маєте облікового запису?<a href="#"> Зареєструйтеся</a></p>
    </div>
</main>
</body>
</html>
