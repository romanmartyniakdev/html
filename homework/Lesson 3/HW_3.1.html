<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
  >
  <meta
    http-equiv="X-UA-Compatible"
    content="ie=edge"
  >
  <title>HW_3.1</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing: border-box;
    }
    body{
      padding: 10px;
    }
    header{
      display: flex;
      justify-content: center;
      align-items: center;
      height: 60vh;
      text-align: center;
      font-size: 40px;
      color: white;
      background-color: #216ABB;
    }
    section{
      padding: 2% 0;
      display: flex;
      justify-content: space-around;
      align-items: center;
    }
    section div{
      color:white;
      background-color: #2f528d;
      width: 32%;
      height: 50vh;
      gap: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
    }
    footer{
      display: flex;
      justify-content: center;
      align-items: center;
      height: 90vh;
      font-size: 40px;
      color:white;
      background-color: #216ABB;
    }
  </style>
</head>
<body>
<header>
  <p>Widgets</p>
</header>
<section>
  <div>
    <p>Big Widgets</p>
  </div>
  <div>
    <p>Bigger Widgets</p>
  </div>
  <div>
    <p>Huge Widgets</p>
  </div>
</section>
<footer>
  <p>Contact</p>
</footer>
</body>
</html>
